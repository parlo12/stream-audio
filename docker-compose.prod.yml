# Working docker-compose.prod.yml for your external database setup
version: "3.9"

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    # SECURITY: bound to localhost only — services reach Redis via the docker network
    ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Authentication Service
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: always
    env_file: .env
    environment:
      GIN_MODE: "release"
      DB_SSLMODE: "${DB_SSLMODE:-require}"
      PGSSLMODE: "${PGSSLMODE:-require}"
      LOG_LEVEL: "info"
      # Use your external DigitalOcean database
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
    depends_on:
      redis:
        condition: service_healthy
    # SECURITY: bound to localhost only — nginx proxies narrafied.com → localhost:8082
    ports: ["127.0.0.1:8082:8082"]
    volumes:
      - content-audio:/app/audio
      - content-covers:/app/uploads/covers
      - ./logs/auth:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Content Service
  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    restart: always
    env_file: .env
    environment: &content-env
      RUN_MODE: "api"
      GIN_MODE: "release"
      DB_SSLMODE: "${DB_SSLMODE:-require}"
      PGSSLMODE: "${PGSSLMODE:-require}"
      AUTH_SERVICE_URL: "${AUTH_SERVICE_URL}"
      LOG_LEVEL: "info"
      AUDIO_STORAGE_PATH: "/app/audio"
      # Use your external DigitalOcean database
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_URL: "redis://redis:6379"
      # Your MQTT configuration
      MQTT_BROKER: "${MQTT_BROKER}"
      MQTT_USERNAME: "${MQTT_USERNAME}"
      MQTT_PASSWORD: "${MQTT_PASSWORD}"
      # API Keys
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      XI_API_KEY: "${XI_API_KEY}"
      ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID}"
      MAX_FILE_SIZE: "50MB"
      UPLOAD_PATH: "/app/uploads"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    # SECURITY: bound to localhost only — nginx proxies narrafied.com → localhost:8083
    # (8084 mapping removed: nothing listens on it)
    ports:
      - "127.0.0.1:8083:8083"
    volumes:
      - content-audio-persistent:/app/audio
      - content-covers-persistent:/app/uploads/covers
      - content-uploads:/app/uploads
      - ./logs/content:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Worker fleet: consumes the asynq queue (transcription, merges, covers).
  # Same image as content-service; no HTTP port. Scale with --scale content-worker=N.
  content-worker:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    restart: always
    env_file: .env
    environment:
      <<: *content-env
      RUN_MODE: "worker"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - content-audio-persistent:/app/audio
      - content-covers-persistent:/app/uploads/covers
      - content-uploads:/app/uploads
      - ./logs/worker:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # asynq queue dashboard (read-only ops view). Bound to localhost; nginx
  # fronts it at /admin/queues/ with basic auth.
  asynqmon:
    image: hibiken/asynqmon:latest
    restart: always
    command: ["--redis-addr=redis:6379", "--port=8085"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8085:8085"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Metrics: Prometheus scrapes content-service /metrics; Grafana visualizes.
  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - content-service
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SERVER_ROOT_URL: "https://narrafied.com/admin/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  prometheus_data:
  grafana_data:
  # Redis persistence
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stream-audio-data/redis

  # Your existing volumes
  content-audio:
  content-covers:
  
  # New persistent volumes
  content-audio-persistent:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stream-audio-data/audio
  content-covers-persistent:
    driver: local  
    driver_opts:
      type: none
      o: bind
      device: /opt/stream-audio-data/covers
  content-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stream-audio-data/uploads

networks:
  default:
    name: stream-audio-network